<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Edit Data</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
    <h2>Edit Data</h2>
    <form id="editForm">
        <input type="text" id="nama" class="form-control mb-2" placeholder="Nama" required>
        <input type="text" id="alamat" class="form-control mb-2" placeholder="Alamat" required>
        <button type="submit" class="btn btn-primary">Update</button>
        <a href="table.html" class="btn btn-secondary">Batal</a>
    </form>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        $(document).ready(function() {
            const urlParams = new URLSearchParams(window.location.search);
            const id = urlParams.get('id');

            // Ambil data lama berdasarkan ID
            $.ajax({
                url: "http://localhost:3000/users/" + id,
                method: "GET",
                success: function(data){
                    $("#nama").val(data.nama);
                    $("#alamat").val(data.alamat);
                },
                error: function(){
                    alert("Gagal ambil data");
                }
            });

            // Proses Update data
            $("#editForm").submit(function(e){
                e.preventDefault();
                $.ajax({
                    url: "http://localhost:3000/users/" + id,
                    method: "PUT",
                    contentType: "application/json",
                    data: JSON.stringify({
                        nama: $("#nama").val(),
                        alamat: $("#alamat").val()
                    }),
                    success: function(){
                        alert("✨ Berhasil update");
                        window.location.href = "tabel.html";
                    },
                    error: function(){
                        alert("❌ Gagal update");
                    }
                });
            });
        });
    </script>
</body>
</html>
