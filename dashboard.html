<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Form Input</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
    <h2>Tambah Data</h2>
    <form id="formData">
        <input type="text" id="nama" class="form-control mb-2" placeholder="Nama" required>
        <input type="text" id="alamat" class="form-control mb-2" placeholder="Alamat" required>
        <button type="submit" class="btn btn-primary">Simpan</button>
        <a href="tabel.html" class="btn btn-success">Lihat Data</a>
    </form>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        $(document).ready(function(){
            $("#formData").submit(function(e){
                e.preventDefault();
                let nama = $("#nama").val();
                let alamat = $("#alamat").val();
                
                $.ajax({
                    url: "http://localhost:3000/users",
                    method: "POST",
                    contentType: "application/json",
                    data: JSON.stringify({
                        nama: nama,
                        alamat: alamat
                    }),
                    success: function(res){
                        alert("🎉 Data berhasil ditambahkan");
                        $("#formData")[0].reset();
                    },
                    error: function(err){
                        console.error("Error:", err);
                        alert("❌ Gagal menambahkan data");
                    }
                });
            });
        });
    </script>
</body>
</html>
