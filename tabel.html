<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Data Users</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.4/css/jquery.dataTables.min.css">
</head>
<body class="container mt-5">
    <h2>Data Users</h2>
    <a href="dashboard.html" class="btn btn-primary mb-3">Tambah</a>
    
    <table id="myTable" class="display" style="width:100%">
        <thead>
            <tr>
                <th>Nama</th>
                <th>Alamat</th>
                <th>Aksi</th>
            </tr>
        </thead>
    </table>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.4/js/jquery.dataTables.min.js"></script>
    <script>
        $(document).ready(function(){
            // Inisialisasi DataTables
            var table = $('#myTable').DataTable({
                ajax: {
                    url: "http://localhost:3000/users",
                    dataSrc: ""
                },
                columns: [
                    { data: 'nama' },
                    { data: 'alamat' },
                    {
                        data: null,
                        render: function(data) {
                            return `
                                <a href="edit.html?id=${data.id}" class="btn btn-warning btn-sm">Edit</a>
                                <button onclick="hapus(${data.id})" class="btn btn-danger btn-sm">Hapus</button>
                            `;
                        }
                    }
                ]
            });

            // FUNCTION DELETE (Dibuat global agar bisa dipanggil onclick)
            window.hapus = function(id) {
                if(confirm("Yakin hapus?")){
                    $.ajax({
                        url: "http://localhost:3000/users/" + id,
                        method: "DELETE",
                        success: function(){
                            alert("Data berhasil dihapus");
                            table.ajax.reload(); // reload tanpa refresh halaman
                        },
                        error: function(){
                            alert("Gagal hapus data");
                        }
                    });
                }
            }
        });
    </script>
</body>
</html>
